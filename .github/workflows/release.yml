name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build for ARM64 (Apple Silicon)
        run: |
          bun build --compile --target=bun-darwin-arm64 --outfile specchio-arm64 src/index.ts
          chmod +x specchio-arm64

      - name: Build for x64 (Intel)
        run: |
          bun build --compile --target=bun-darwin-x64 --outfile specchio-x64 src/index.ts
          chmod +x specchio-x64

      - name: Verify binaries execute
        run: |
          ./specchio-arm64 --version
          ./specchio-arm64 --help

      - name: Generate SHA256 checksums
        run: |
          ARM64_SHA256=$(shasum -a 256 specchio-arm64 | awk '{print $1}')
          X64_SHA256=$(shasum -a 256 specchio-x64 | awk '{print $1}')

          echo "ARM64_SHA256=$ARM64_SHA256" >> $GITHUB_ENV
          echo "X64_SHA256=$X64_SHA256" >> $GITHUB_ENV

          echo "$ARM64_SHA256  specchio-arm64" > checksums.txt
          echo "$X64_SHA256  specchio-x64" >> checksums.txt

          cat checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            specchio-arm64
            specchio-x64
            checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Wait for tarball to be available
          echo "Waiting for tarball to propagate..."
          for i in $(seq 1 10); do
            if curl -fsSL "https://github.com/Alexintosh/specchio-cli/archive/refs/tags/v${VERSION}.tar.gz" -o /dev/null; then
              echo "Tarball available"
              break
            fi
            echo "Attempt $i: not ready yet, waiting 5s..."
            sleep 5
          done

          TARBALL_SHA256=$(curl -fsSL "https://github.com/Alexintosh/specchio-cli/archive/refs/tags/v${VERSION}.tar.gz" | shasum -a 256 | awk '{print $1}')
          echo "Tarball SHA256: $TARBALL_SHA256"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Alexintosh/homebrew-specchio.git" homebrew-tap
          cd homebrew-tap

          cat > Formula/specchio.rb << FORMULA_EOF
          # typed: true
          # frozen_string_literal: true

          class Specchio < Formula
            desc "Interactive setup CLI for Specchio iOS development environment"
            homepage "https://github.com/Alexintosh/specchio-cli"
            url "https://github.com/Alexintosh/specchio-cli/archive/refs/tags/v${VERSION}.tar.gz"
            sha256 "${TARBALL_SHA256}"
            version "${VERSION}"
            license "MIT"

            def install
              arm64 = "https://github.com/Alexintosh/specchio-cli/releases/download/v#{version}/specchio-arm64"
              x64 = "https://github.com/Alexintosh/specchio-cli/releases/download/v#{version}/specchio-x64"

              if Hardware::CPU.arm?
                system "curl", "-fSL", "-o", "specchio-bin", arm64
              else
                system "curl", "-fSL", "-o", "specchio-bin", x64
              end

              chmod 0755, "specchio-bin"
              bin.install "specchio-bin" => "specchio"
            end

            test do
              assert_match "specchio v", shell_output("#{bin}/specchio --version")
            end
          end
          FORMULA_EOF

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Formula/specchio.rb
          git commit -m "chore: update Homebrew formula for v${VERSION}" || echo "No changes to commit"
          git push

      - name: Release summary
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "## Release v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Binary | SHA256 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| specchio-arm64 | \`${{ env.ARM64_SHA256 }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| specchio-x64 | \`${{ env.X64_SHA256 }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "brew tap Alexintosh/specchio && brew install specchio" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
