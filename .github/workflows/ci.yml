name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build ARM64 binary
        run: bun build --compile --target=bun-darwin-arm64 --outfile specchio-arm64 src/index.ts

      - name: Build x64 binary
        run: bun build --compile --target=bun-darwin-x64 --outfile specchio-x64 src/index.ts

      - name: Verify ARM64 binary executes
        run: ./specchio-arm64 --version
